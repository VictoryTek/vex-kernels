name: Update Bazzite Kernel

on:
  # ============================================================
  # SECTION: TRIGGERS
  # ============================================================
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ============================================================
      # SECTION: SETUP
      # ============================================================
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      # ============================================================
      # SECTION: CHECK FOR NEW RELEASE
      # ============================================================
      - name: Check for new commits on bazzite branch
        id: check
        run: |
          CURRENT_VERSION=$(cat pins.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          MAJOR_MINOR=$(echo $CURRENT_VERSION | cut -d. -f1,2)
          BRANCH="bazzite-${MAJOR_MINOR}"

          # Get latest branch commit
          BRANCH_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/bazzite-org/kernel-bazzite/branches/${BRANCH}")

          LATEST_REV=$(echo "$BRANCH_RESPONSE" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['commit']['sha'])")

          # Get latest release
          RELEASE_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/bazzite-org/kernel-bazzite/releases/latest")

          LATEST_TAG=$(echo "$RELEASE_RESPONSE" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")

          # ============================================================
          # VERIFICATION: Tag format is valid e.g. 6.17.7-ba28
          # ============================================================
          echo "$LATEST_TAG" | grep -qP '^\d+\.\d+\.\d+-ba\d+$' || {
            echo "ERROR: Tag $LATEST_TAG does not match expected format X.Y.Z-baN"
            exit 1
          }
          echo "✅ Tag format valid: $LATEST_TAG"

          # ============================================================
          # VERIFICATION: Kernel version in tag matches the branch
          # e.g. tag 6.17.7-ba28 should be on branch bazzite-6.17
          # ============================================================
          TAG_MAJOR_MINOR=$(echo $LATEST_TAG | cut -d. -f1,2)
          if [ "$TAG_MAJOR_MINOR" != "$MAJOR_MINOR" ]; then
            echo "ERROR: Tag major.minor $TAG_MAJOR_MINOR does not match branch $BRANCH"
            exit 1
          fi
          echo "✅ Tag major.minor matches branch: $TAG_MAJOR_MINOR = $MAJOR_MINOR"

          # ============================================================
          # VERIFICATION: Branch commit is real and reachable
          # ============================================================
          if [ -z "$LATEST_REV" ] || [ "$LATEST_REV" = "null" ]; then
            echo "ERROR: Could not get latest commit from branch $BRANCH"
            exit 1
          fi
          echo "✅ Branch commit valid: $LATEST_REV"

          # ============================================================
          # VERIFICATION: Vanilla kernel version exists on kernel.org
          # ============================================================
          KERNEL_VER=$(echo "$LATEST_TAG" | cut -d- -f1)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VER}.tar.xz")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Vanilla kernel linux-${KERNEL_VER}.tar.xz not found on kernel.org (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Vanilla kernel tarball exists on kernel.org: linux-${KERNEL_VER}.tar.xz"

          CURRENT_REV=$(cat pins.json | python3 -c "import sys,json; print(json.load(sys.stdin)['rev'])")

          echo "latest_rev=$LATEST_REV" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "current_rev=$CURRENT_REV" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          if [ "$LATEST_REV" != "$CURRENT_REV" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # SECTION: FETCH NEW HASHES
      # ============================================================
      - name: Fetch new source hash
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_tag }}"
          LATEST_REV="${{ steps.check.outputs.latest_rev }}"

          SRC_HASH=$(nix run nixpkgs#nix-prefetch-github -- \
            --rev "$LATEST_REV" \
            bazzite-org kernel-bazzite \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['hash'])")

          KERNEL_VER=$(echo "$VERSION" | cut -d- -f1)

          KERNEL_HASH=$(nix-prefetch-url --type sha256 \
            "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VER}.tar.xz" 2>/dev/null \
            | tail -1 \
            | xargs -I{} nix hash convert --hash-algo sha256 --to sri {})

          python3 -c "
          import json
          data = {
            'version': '$VERSION',
            'rev': '$LATEST_REV',
            'srcHash': '$SRC_HASH',
            'kernelHash': '$KERNEL_HASH'
          }
          print(json.dumps(data, indent=2))
          " > pins.json

          echo "Updated pins.json to $VERSION"
          cat pins.json

      # ============================================================
      # SECTION: UPDATE FLAKE LOCK
      # ============================================================
      - name: Update flake.lock
        if: steps.check.outputs.needs_update == 'true'
        run: nix flake update

      # ============================================================
      # SECTION: OPEN PULL REQUEST
      # ============================================================
      - name: Open pull request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "kernel: bump bazzite to ${{ steps.check.outputs.latest_tag }}"
          title: "Kernel update: ${{ steps.check.outputs.current_version }} → ${{ steps.check.outputs.latest_tag }}"
          body: |
            Automated update from upstream bazzite kernel.

            - **From version:** `${{ steps.check.outputs.current_version }}`
            - **To version:** `${{ steps.check.outputs.latest_tag }}`
            - **New commit:** `${{ steps.check.outputs.latest_rev }}`
            - **Branch tracked:** `${{ steps.check.outputs.branch }}`
            - **Release page:** https://github.com/bazzite-org/kernel-bazzite/releases/tag/${{ steps.check.outputs.latest_tag }}

            Review and merge once the build check passes.
          branch: "update/bazzite-kernel-${{ steps.check.outputs.latest_tag }}"
          delete-branch: true