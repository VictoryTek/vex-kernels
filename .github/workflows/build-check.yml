name: Build Check

on:
  # ============================================================
  # SECTION: TRIGGERS
  # ============================================================
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # SECTION: SETUP
      # ============================================================
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Add swap space
        run: |
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # ============================================================
      # SECTION: FLAKE CHECK
      # ============================================================
      - name: Check flake is valid
        run: nix flake check

      # ============================================================
      # SECTION: BUILD KERNEL
      # ============================================================
      - name: Build kernel
        run: nix build .#linux-bazzite --show-trace