name: Build Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Add swap space
        run: |
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Check flake is valid
        run: nix flake check

      - name: Build kernel
        run: |
          nix build .#linux-bazzite --show-trace --keep-failed 2>&1 || {
            echo "=== BUILD FAILED, fetching full log ==="
            nix log /nix/store/93sgipp2495nl50xj1d9szgqg8khif0n-linux-6.17.7-ba28.drv 2>/dev/null | grep -E "(error:|Error|FAILED|undefined|cannot)" | tail -30
            exit 1
          }