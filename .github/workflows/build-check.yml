name: Build Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Add swap space
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Check flake is valid
        run: nix flake check

      - name: Build kernel
        run: |
          nix build .#linux-bazzite --show-trace --keep-failed 2>&1 || {
            echo "=== BUILD FAILED, fetching full log ==="
            nix log $(nix build .#linux-bazzite --dry-run 2>&1 | grep "will be built" | grep -o '/nix/store/[^ ]*\.drv') 2>/dev/null | tail -50
            exit 1
          }