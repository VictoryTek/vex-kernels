name: Build Check

on:
  # ============================================================
  # SECTION: TRIGGERS
  # ============================================================
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # SECTION: SETUP
      # ============================================================
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Add swap space
        run: |
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # ============================================================
      # SECTION: FLAKE CHECK
      # ============================================================
      - name: Check flake is valid
        run: nix flake check

      # ============================================================
      # SECTION: BUILD KERNEL
      # ============================================================
      - name: Build kernel
        run: nix build .#linux-bazzite --show-trace

      # ============================================================
      # SECTION: VERIFY BUILD
      # Confirms the compiled kernel version matches pins.json
      # ============================================================
      - name: Verify kernel version
        run: |
          EXPECTED_VERSION=$(cat pins.json | python3 -c "import sys,json; v=json.load(sys.stdin)['version']; print(v.split('-')[0])")
          KERNEL_RELEASE=$(cat $(nix build .#linux-bazzite --print-out-paths --no-link)/lib/modules/*/modules.builtin 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "unknown")

          # Check the kernel image directly
          BUILT_PATH=$(nix build .#linux-bazzite --print-out-paths --no-link)
          if find $BUILT_PATH -name "vmlinuz*" | head -1 | xargs strings 2>/dev/null | grep -q "Linux version ${EXPECTED_VERSION}"; then
            echo "✅ Kernel version verified: ${EXPECTED_VERSION}"
          else
            echo "⚠️  Could not verify kernel version string (this is non-fatal)"
            echo "Expected: ${EXPECTED_VERSION}"
          fi